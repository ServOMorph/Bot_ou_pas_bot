    tool:
      primary: "claude-opus-4-7"
      fallbacks: ["claude-sonnet-4-6", "gemini-3-flash", "gemma-4-local"]

    temperature: 0.2

    paths:
      root: "agents/ChefIA"
      config: "agents/ChefIA/config.yaml"
      prompt: "agents/ChefIA/prompt.md"
      context: "agents/ChefIA/context"
      examples: "agents/ChefIA/examples"
      knowledge: "agents/ChefIA/knowledge"

# EQUIPE_IA - Agents Registry (Source de Vérité)
#
# Fichier de référence unique pour tous les agents
# Utilisé par: scripts de création, orchestration, navigation, configuration
# ⚠️  À jour au 2026-04-24

version: "1.0"
project: "Bot ou pas Bot"


# ============================================================================
# WORKFLOWS - Phases du projet
# ============================================================================

workflows:
  phase_1:
    name: "Phase 1: Documentation"
    filename: "workflows/phase1_docs.yaml"
    lead_agent: "ChefIA"
    support_agents: ["Scribe", "Archi"]
    description: "Spec produit, archi, roadmap"
    duration_weeks: 2

  phase_2:
    name: "Phase 2: Development"
    filename: "workflows/phase2_dev.yaml"
    lead_agent: "ChefIA"
    support_agents: ["Archi", "Fullo", "Mobi", "Quali"]
    description: "Dev fullstack + mobile + tests"
    duration_weeks: 4

  phase_3:
    name: "Phase 3: GTM"
    filename: "workflows/phase3_gtm.yaml"
    lead_agent: "ChefIA"
    support_agents: ["Grow", "Bizo", "Dezy"]
    description: "Go-to-market strategy"
    duration_weeks: 2

  phase_4:
    name: "Phase 4: Scale"
    filename: "workflows/phase4_scale.yaml"
    lead_agent: "ChefIA"
    support_agents: ["Archi", "Fullo", "Mobi", "Bizo"]
    description: "Scaling & optimisation"
    duration_weeks: 4

# ============================================================================
# SHARED RESOURCES
# ============================================================================

shared:
  context:
    - path: "shared/context/projet.md"
      description: "Brief projet Bot ou pas Bot"
      updated: "2026-04-24"

    - path: "shared/context/glossaire.md"
      description: "Glossaire projet"
      updated: "2026-04-24"

    - path: "shared/context/stack.md"
      description: "Stack technique"
      updated: "2026-04-24"

  tools:
    - path: "shared/tools/api-reference.md"
      description: "API reference"

    - path: "shared/tools/components.md"
      description: "Composants réutilisables"

  templates:
    - path: "shared/templates/prompt-template.md"
      description: "Template pour prompts"

    - path: "shared/templates/documentation-template.md"
      description: "Template pour documentation"

# ============================================================================
# FOLDERS STRUCTURE REFERENCE
# ============================================================================

folders_structure:
  EQUIPE_IA:
    - "agents-registry.yaml          # ← CE FICHIER"
    - "tools.yaml                    # Hiérarchie centralisée outils"
    - "config.yaml                   # Config maître (empty ou optionnel)"
    - "README.md                     # Documentation"
    - "agents/[AgentName]/"
    - "  ├── config.yaml"
    - "  ├── prompt.md"
    - "  ├── context/                # Documentation du rôle"
    - "  ├── examples/               # Exemples & patterns"
    - "  ├── knowledge/              # Knowledge base agent"
    - "  └── memory/"
    - "workflows/                    # Phases du projet"
    - "  ├── phase1_docs.yaml"
    - "  ├── phase2_dev.yaml"
    - "  ├── phase3_gtm.yaml"
    - "  └── phase4_scale.yaml"
    - "shared/"
    - "  ├── context/                # Documentation partagée"
    - "  ├── tools/                  # Outils partagés"
    - "  └── templates/              # Templates"
    - "outputs/                      # Outputs par agent"
    - "  ├── ChefIA/"
    - "  ├── Scribe/"
    - "  └── ..."

# ============================================================================
# CONFIGURATION DEFAULTS
# ============================================================================

defaults:
  temperature:
    orchestration: 0.2
    development: 0.2
    testing: 0.1
    design: 0.7
    business: 0.6

  fallback_strategy:
    enabled: true
    max_retries: 3
    timeout_seconds: 30
    log_failures: true

  output_formats:
    - "markdown"
    - "yaml"
    - "json"

# ============================================================================
# METADATA
# ============================================================================

metadata:
  version: "1.0"
  created: "2026-04-24"
  updated: "2026-04-24"
  maintainer: "ServOMorph Team"
  source_of_truth: true
  used_by:
    - "create_equipe_ia.py (script génération)"
    - "Orchestration system"
    - "Navigation & discovery"
    - "Configuration management"
